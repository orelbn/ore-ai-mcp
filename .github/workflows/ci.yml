name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare Wrangler config
        run: cp wrangler.jsonc.example wrangler.jsonc

      - name: Check
        run: vp check

      - name: Test
        run: vp test

      - name: Build UI
        run: vp build

      - name: Validate Worker Build
        run: wrangler deploy --dry-run --env=""
